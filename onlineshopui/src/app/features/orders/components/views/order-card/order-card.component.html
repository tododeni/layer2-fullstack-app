<app-card [hoverable]="true">
    <div class="flex flex-col gap-4">
        <div class="flex items-start justify-between">
            <div>
                <div class="text-sm text-text-muted">Order</div>
                <div class="text-lg font-semibold text-text">{{ order().id }}</div>
            </div>
            <div class="text-sm text-text-muted">{{ order().createdAt }}</div>
        </div>

        <div class="flex items-center justify-between">
            <div class="text-text-muted text-sm">Items</div>
            <div class="text-text">{{ order().totalItems }}</div>
        </div>

        <div class="flex items-center justify-between">
            <div class="text-text-muted text-sm">Total</div>
            <div class="text-xl font-semibold text-text">${{ order().totalAmount.toFixed(2) }}</div>
        </div>

        <button
            type="button"
            (click)="onViewDetails()"
            class="w-full px-4 py-2 rounded-md border border-border text-text hover:bg-surface-2 transition-colors"
        >
            View Details
        </button>
    </div>
</app-card>
