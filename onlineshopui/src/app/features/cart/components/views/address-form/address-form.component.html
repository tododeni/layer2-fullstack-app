<app-card>
    <div class="space-y-4">
        <div class="text-lg font-semibold text-text">Delivery Address</div>

        <form [formGroup]="form()" class="space-y-4">
            <!-- Country Field -->
            <div>
                <label for="country" class="block text-sm font-medium text-text-muted mb-1">
                    Country
                </label>
                <input
                    id="country"
                    type="text"
                    formControlName="country"
                    [disabled]="isDisabled()"
                    class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent disabled:opacity-50"
                    placeholder="e.g., United States"
                />
                <app-error-message [control]="form().controls['country']" />
            </div>

            <!-- City Field -->
            <div>
                <label for="city" class="block text-sm font-medium text-text-muted mb-1">
                    City
                </label>
                <input
                    id="city"
                    type="text"
                    formControlName="city"
                    [disabled]="isDisabled()"
                    class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent disabled:opacity-50"
                    placeholder="e.g., New York"
                />
                <app-error-message [control]="form().controls['city']" />
            </div>

            <!-- County Field -->
            <div>
                <label for="county" class="block text-sm font-medium text-text-muted mb-1">
                    County / State
                </label>
                <input
                    id="county"
                    type="text"
                    formControlName="county"
                    [disabled]="isDisabled()"
                    class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent disabled:opacity-50"
                    placeholder="e.g., NY"
                />
                <app-error-message [control]="form().controls['county']" />
            </div>

            <!-- Street Address Field -->
            <div>
                <label for="streetAddress" class="block text-sm font-medium text-text-muted mb-1">
                    Street Address
                </label>
                <input
                    id="streetAddress"
                    type="text"
                    formControlName="streetAddress"
                    [disabled]="isDisabled()"
                    class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent disabled:opacity-50"
                    placeholder="e.g., 123 Main St, Apt 4B"
                />
                <app-error-message [control]="form().controls['streetAddress']" />
            </div>
        </form>
    </div>
</app-card>
