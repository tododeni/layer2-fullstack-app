<app-card>
    <div class="space-y-4">
        <div class="text-lg font-semibold text-text">Order Summary</div>
        <div class="flex items-center justify-between text-text">
            <span>Items</span>
            <span>{{ itemCount() }}</span>
        </div>
        <div class="flex items-center justify-between text-text">
            <span>Subtotal</span>
            <span class="text-xl font-semibold">${{ subtotal() }}</span>
        </div>
        <div class="pt-4 border-t border-border flex flex-col gap-3">
            <button
                type="button"
                (click)="onCheckout()"
                [disabled]="isSubmitting()"
                class="w-full px-4 py-2 rounded-md bg-primary hover:bg-accent text-primary-foreground font-medium transition-colors disabled:opacity-50"
            >
                Place Order
            </button>
            <button
                type="button"
                (click)="onClear()"
                [disabled]="isSubmitting()"
                class="w-full px-4 py-2 rounded-md border border-border text-text hover:bg-surface-2 transition-colors disabled:opacity-50"
            >
                Clear Cart
            </button>
        </div>
    </div>
</app-card>
