<div class="min-h-screen bg-surface py-8">
    <div class="container mx-auto px-4 max-w-3xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-text">Create New Product</h1>
            <p class="mt-2 text-text-muted">Add a new product to your catalog</p>
        </div>

        <!-- Loading State for Categories -->
        @if (loading() && categories().length === 0) {
            <app-spinner [overlay]="true"></app-spinner>
        }

        <!-- Form -->
        @if (!loading() || categories().length > 0) {
            <app-card>
                <app-product-form
                    [form]="form"
                    [categories]="categories()"
                    [isSubmitting]="isSubmitting()"
                    [submitLabel]="'Create Product'"
                    (formSubmit)="onSubmit()"
                    (cancelled)="onCancel()"
                />
            </app-card>
        }
    </div>
</div>
