<form [formGroup]="form()" class="space-y-6">
    <!-- Product Name -->
    <div>
        <label for="name" class="block text-sm font-medium text-text-muted mb-1">
            Product Name
        </label>
        <input
            id="name"
            type="text"
            formControlName="name"
            class="w-full px-3 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring bg-surface text-text"
            placeholder="Enter product name"
        />
        <app-error-message [control]="form().get('name')" />
    </div>

    <!-- Product Description -->
    <div>
        <label for="description" class="block text-sm font-medium text-text-muted mb-1">
            Description
        </label>
        <textarea
            id="description"
            formControlName="description"
            rows="4"
            class="w-full px-3 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring bg-surface text-text"
            placeholder="Enter product description"
        ></textarea>
        <app-error-message [control]="form().get('description')" />
    </div>

    <!-- Price and Weight Row -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Price -->
        <div>
            <label for="price" class="block text-sm font-medium text-text-muted mb-1">
                Price ($)
            </label>
            <input
                id="price"
                type="number"
                formControlName="price"
                step="0.01"
                min="0"
                class="w-full px-3 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring bg-surface text-text"
                placeholder="0.00"
            />
            <app-error-message [control]="form().get('price')" />
        </div>

        <!-- Weight -->
        <div>
            <label for="weight" class="block text-sm font-medium text-text-muted mb-1">
                Weight (g)
            </label>
            <input
                id="weight"
                type="number"
                formControlName="weight"
                step="1"
                min="0"
                class="w-full px-3 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring bg-surface text-text"
                placeholder="0"
            />
            <app-error-message [control]="form().get('weight')" />
        </div>
    </div>

    <!-- Category -->
    <div>
        <label for="categoryId" class="block text-sm font-medium text-text-muted mb-1">
            Category
        </label>
        <select
            id="categoryId"
            formControlName="categoryId"
            class="w-full px-3 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring bg-surface text-text"
        >
            <option value="">Select a category</option>
            @for (category of categories(); track category.id) {
                <option [value]="category.id">{{ category.name }}</option>
            }
        </select>
        <app-error-message [control]="form().get('categoryId')" />
    </div>

    <!-- Supplier -->
    <div>
        <label for="supplierId" class="block text-sm font-medium text-text-muted mb-1">
            Supplier
        </label>
        <select
            id="supplierId"
            formControlName="supplierId"
            class="w-full px-3 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring bg-surface text-text"
        >
            <option value="">Select a supplier</option>
            @for (supplier of suppliers(); track supplier.id) {
                <option [value]="supplier.id">{{ supplier.name }}</option>
            }
        </select>
        <app-error-message [control]="form().get('supplierId')" />
    </div>

    <!-- Image URL -->
    <div>
        <label for="imageUrl" class="block text-sm font-medium text-text-muted mb-1">
            Image URL
        </label>
        <input
            id="imageUrl"
            type="url"
            formControlName="imageUrl"
            class="w-full px-3 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring bg-surface text-text"
            placeholder="https://example.com/image.jpg"
        />
        <app-error-message [control]="form().get('imageUrl')" />
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-4 pt-4">
        <button
            type="button"
            (click)="onCancelClick()"
            [disabled]="isSubmitting()"
            class="flex-1 px-4 py-2 border border-border text-text rounded-md hover:bg-surface-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
            Cancel
        </button>
        <button
            type="button"
            (click)="onSubmitClick()"
            [disabled]="isSubmitting()"
            class="flex-1 px-4 py-2 bg-primary hover:bg-accent text-primary-foreground rounded-md disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
            {{ submitLabel() }}
        </button>
    </div>
</form>
