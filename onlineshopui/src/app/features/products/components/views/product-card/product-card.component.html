<app-card [hoverable]="true" [fullHeight]="true">
    <div class="flex flex-col h-full">
        <!-- Product Image -->
        <div class="relative w-full aspect-[4/3] bg-surface-2 rounded-lg overflow-hidden mb-4">
            <img [src]="imageUrl()" [alt]="product().name" class="w-full h-full object-cover" />
        </div>

        <!-- Product Info -->
        <div class="flex-1 flex flex-col">
            <!-- Category Badge -->
            <div class="mb-2">
                <span
                    class="inline-flex items-center px-2.5 py-1 text-xs font-medium rounded-full bg-primary/10 text-primary"
                >
                    {{ product().category.name }}
                </span>
            </div>

            <!-- Product Name -->
            <h3 class="text-lg font-semibold text-text mb-2 line-clamp-2 tracking-tight">
                {{ product().name }}
            </h3>

            <!-- Product Description -->
            <p class="text-sm text-text-muted mb-3 line-clamp-2 flex-1">
                {{ product().description }}
            </p>

            <!-- Price and Weight -->
            <div class="flex items-baseline justify-between mb-4">
                <span class="text-2xl font-semibold text-text">
                    ${{ product().price.toFixed(2) }}
                </span>
                <span class="text-sm text-text-muted uppercase tracking-wide">
                    {{ product().weight }}g
                </span>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-2">
                <button
                    (click)="onViewDetails()"
                    class="flex-1 px-3 py-1.5 text-sm bg-surface border border-border text-text rounded-full hover:bg-surface-2 transition-colors"
                >
                    View
                </button>
                <button
                    *appHasRole="UserRole.CUSTOMER"
                    (click)="onAddToCart()"
                    class="flex-1 px-3 py-1.5 text-sm bg-primary hover:bg-accent text-primary-foreground rounded-full transition-colors"
                >
                    Add to Cart
                </button>
                <button
                    *appHasRole="UserRole.ADMIN"
                    (click)="onEdit()"
                    class="flex-1 px-3 py-1.5 text-sm bg-surface-2 hover:bg-surface border border-border text-text rounded-full transition-colors"
                >
                    Edit
                </button>
                <button
                    *appHasRole="UserRole.ADMIN"
                    (click)="onDelete()"
                    class="flex-1 px-3 py-1.5 text-sm bg-destructive hover:bg-destructive/90 text-destructive-foreground rounded-full transition-colors"
                >
                    Delete
                </button>
            </div>
        </div>
    </div>
</app-card>
