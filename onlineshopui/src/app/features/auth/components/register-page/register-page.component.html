<div class="flex items-center justify-center min-h-[calc(100vh-4rem)] px-4 py-8">
    <div class="w-full max-w-md">
        <div class="bg-surface rounded-xl shadow-card border border-border p-6 md:p-8">
            <h2 class="text-2xl font-bold text-text mb-6">Create Account</h2>

            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-text-muted mb-1">
                        Email
                    </label>
                    <input
                        id="email"
                        type="email"
                        formControlName="email"
                        autocomplete="username"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="form.controls['email']" />
                </div>

                <!-- First Name Field -->
                <div>
                    <label for="firstName" class="block text-sm font-medium text-text-muted mb-1">
                        First Name
                    </label>
                    <input
                        id="firstName"
                        type="text"
                        formControlName="firstName"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="form.controls['firstName']" />
                </div>

                <!-- Last Name Field -->
                <div>
                    <label for="lastName" class="block text-sm font-medium text-text-muted mb-1">
                        Last Name
                    </label>
                    <input
                        id="lastName"
                        type="text"
                        formControlName="lastName"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="form.controls['lastName']" />
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-text-muted mb-1">
                        Password
                    </label>
                    <input
                        id="password"
                        type="password"
                        formControlName="password"
                        autocomplete="new-password"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="form.controls['password']" />
                </div>

                <!-- Error Message -->
                @if (errorMessage()) {
                    <div
                        class="p-3 rounded-md bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800"
                    >
                        <p class="text-sm text-red-600 dark:text-red-500">{{ errorMessage() }}</p>
                    </div>
                }

                <!-- Submit Button -->
                <button
                    type="submit"
                    [disabled]="form.invalid || isSubmitting()"
                    class="w-full px-4 py-2 rounded-md bg-primary hover:bg-accent text-primary-foreground font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    @if (isSubmitting()) {
                        Creating Account...
                    } @else {
                        Create Account
                    }
                </button>
            </form>

            <!-- Login Link -->
            <div class="mt-6 text-center">
                <p class="text-sm text-text-muted">
                    Already have an account?
                    <a [routerLink]="loginLink" class="text-primary hover:underline font-medium">
                        Sign In
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
