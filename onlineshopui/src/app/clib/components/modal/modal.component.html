@if (isOpen()) {
    <div
        role="button"
        tabindex="0"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 dark:bg-black/70 p-4"
        (click)="onBackdropClick($event)"
        (keydown.enter)="closed.emit()"
        (keydown.escape)="closed.emit()"
    >
        <div class="bg-surface rounded-xl shadow-card max-w-md w-full border border-border">
            <div class="flex items-center justify-between p-4 border-b border-border">
                <h3 class="text-xl font-semibold text-text">
                    {{ title() }}
                </h3>
                <button
                    type="button"
                    (click)="closed.emit()"
                    class="text-text-muted hover:text-text transition-colors"
                >
                    <app-icon name="x" size="md" />
                </button>
            </div>

            <div class="p-4 text-text">
                <ng-content />
            </div>

            <div class="flex items-center justify-end gap-3 p-4 border-t border-border">
                <button
                    type="button"
                    (click)="onCancel()"
                    [disabled]="isProcessing()"
                    class="px-4 py-2 rounded-md border border-border hover:bg-surface-2 text-text font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    {{ cancelText() }}
                </button>
                <button
                    type="button"
                    (click)="onConfirm()"
                    [disabled]="isProcessing()"
                    class="px-4 py-2 rounded-md bg-red-600 hover:bg-red-700 dark:bg-red-500 dark:hover:bg-red-600 text-white font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    {{ confirmText() }}
                </button>
            </div>
        </div>
    </div>
}
