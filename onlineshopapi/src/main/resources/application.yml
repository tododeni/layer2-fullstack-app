logging:
  level:
    msg.onlineshopapi: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

server:
  port: 3000
  servlet:
    context-path: /api

spring:
  application:
    name: onlineshopapi

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    schemas: public

  jpa:
    hibernate:
      ddl-auto: validate

app:
  order:
    strategy: SINGLE_LOCATION
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000